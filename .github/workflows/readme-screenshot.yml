name: Refresh README Screenshot

on:
  workflow_run:
    workflows:
      - pages-build-deployment
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-screenshot
  cancel-in-progress: false

jobs:
  capture:
    name: Capture live hero
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.UFO_FILES_WORKFLOW_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Capture screenshot
        run: npm run screenshots

      - name: Commit screenshot update
        run: |
          if git diff --quiet -- assets/homepage-hero.png; then
            echo "README screenshot is already current."
            exit 0
          fi

          git config user.name "ufo-files"
          git config user.email "297273897+ufo-files@users.noreply.github.com"
          git add assets/homepage-hero.png
          git commit -m "Update homepage screenshot [skip ci]"
          git fetch origin "${{ github.ref_name }}"
          git rebase "origin/${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"
